version-resolver:
  major:
    labels:
      - "major"
      - "breaking"
  minor:
    labels:
      - "feature"
      - "enhancement"
      - "analytics"
      - "visualization"
  patch:
    labels:
      - "bug"
      - "fix"
      - "security"
      - "dependencies"
      - "documentation"
      - "performance"
      - "refactor"
  default: patch

# Autolabeler is BACKUP for PRs without labels
# Primary labeling happens via .github/labeler.yml
autolabeler:
  # Features & Enhancements
  - label: "feature"
    title:
      - '/^feat(\([^)]+\))?:/i'
      - '/^feature(\([^)]+\))?:/i'
      - '/^add(\([^)]+\))?:/i'
  
  - label: "enhancement"
    title:
      - '/^enhance(\([^)]+\))?:/i'
      - '/^improve(\([^)]+\))?:/i'
      - '/^improvement(\([^)]+\))?:/i'
  
  # Bug Fixes
  - label: "bug"
    title:
      - '/^fix(\([^)]+\))?:/i'
      - '/^bug(\([^)]+\))?:/i'
  
  - label: "fix"
    title:
      - '/^fix(\([^)]+\))?:/i'
  
  # Analytics & Data
  - label: "analytics"
    title:
      - '/^analytics(\([^)]+\))?:/i'
      - '/^stats(\([^)]+\))?:/i'
      - '/^metrics(\([^)]+\))?:/i'
  
  - label: "visualization"
    title:
      - '/^visualization(\([^)]+\))?:/i'
      - '/^chart(\([^)]+\))?:/i'
      - '/^graph(\([^)]+\))?:/i'
  
  - label: "database"
    title:
      - '/^database(\([^)]+\))?:/i'
      - '/^db(\([^)]+\))?:/i'
  
  # Documentation
  - label: "documentation"
    title:
      - '/^docs(\([^)]+\))?:/i'
      - '/^doc(\([^)]+\))?:/i'
    files:
      - '**/*.md'
      - 'docs/**/*'
  
  # UI/UX
  - label: "ui"
    title:
      - '/^ui(\([^)]+\))?:/i'
  
  - label: "design"
    title:
      - '/^design(\([^)]+\))?:/i'
  
  - label: "style"
    title:
      - '/^style(\([^)]+\))?:/i'
  
  # Dependencies - CRITICAL
  - label: "dependencies"
    title:
      - '/^build\(deps\):/i'
      - '/^build\(deps-dev\):/i'
      - '/^chore\(deps\):/i'
      - '/^chore\(deps-dev\):/i'
      - '/^deps(\([^)]+\))?:/i'
      - '/^dependency(\([^)]+\))?:/i'
      - '/^dependencies(\([^)]+\))?:/i'
      - '/^bump/i'
      - '/^update.*dependenc/i'
    files:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'pnpm-lock.yaml'
  
  # Security & Compliance
  - label: "security"
    title:
      - '/^security(\([^)]+\))?:/i'
      - '/^sec(\([^)]+\))?:/i'
      - '/^fix-vuln(\([^)]+\))?:/i'
      - '/\[security\]/i'
  
  - label: "compliance"
    title:
      - '/^compliance(\([^)]+\))?:/i'
      - '/^audit(\([^)]+\))?:/i'
  
  # Performance & Infrastructure
  - label: "performance"
    title:
      - '/^perf(\([^)]+\))?:/i'
      - '/^optimize(\([^)]+\))?:/i'
  
  - label: "infrastructure"
    title:
      - '/^infra(\([^)]+\))?:/i'
      - '/^ci(\([^)]+\))?:/i'
      - '/^cd(\([^)]+\))?:/i'
    files:
      - '.github/**/*'
  
  - label: "build"
    title:
      - '/^build(\([^)]+\))?:/i'
      - '/^chore\(build\):/i'
  
  - label: "config"
    title:
      - '/^config(\([^)]+\))?:/i'
      - '/^chore\(config\):/i'
  
  # Code Quality
  - label: "refactor"
    title:
      - '/^refactor(\([^)]+\))?:/i'
  
  - label: "testing"
    title:
      - '/^test(\([^)]+\))?:/i'
    files:
      - '**/*.test.*'
      - '**/*.spec.*'
      - 'cypress/**/*'
      - '__tests__/**/*'
  
  # Version Control & Breaking Changes
  - label: "major"
    title:
      - '/^major(\([^)]+\))?:/i'
      - '/^breaking(\([^)]+\))?:/i'
      - '/^BREAKING CHANGE:/i'
      - '/\[breaking\]/i'
  
  - label: "breaking"
    title:
      - '/^breaking(\([^)]+\))?:/i'
      - '/^BREAKING CHANGE:/i'
      - '/\[breaking\]/i'
  
  # Dependencies Subcategories
  - label: "javascript"
    files:
      - 'package.json'
      - 'package-lock.json'
  
  - label: "github_actions"
    files:
      - '.github/workflows/**'
      - '.github/actions/**'
